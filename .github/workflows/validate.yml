name: PR Validation

on:
  pull_request:
    branches: [ main ]

jobs:
  commit-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check Commit Message Format
        run: |
          # The regex matches something like: [UC-0A] Fix severity: missing keywords -> added triggers
          # Matches commits in the PR.
          for commit in $(git rev-list --no-merges HEAD ^origin/main); do
            msg=$(git log -1 --pretty=format:%s $commit)
            echo "Checking commit: $msg"
            if [[ ! $msg =~ ^\[UC-[0-9][A-Za-z]\][[:space:]]Fix[[:space:]].+:[[:space:]].+[[:space:]]→[[:space:]].+ ]]; then
              echo "Error: Commit message '$msg' does not follow the format!"
              echo "Correct format: [UC-ID] Fix [what]: [why it failed] → [what you changed]"
              exit 1
            fi
          done

  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Add any required packages here if needed later.
      - name: Check Python Syntax (UC-0A)
        run: python -m py_compile uc-0a/classifier.py
      - name: Check Python Syntax (UC-0B, UC-0C, UC-X)
        run: |
          python -m py_compile uc-0b/app.py
          python -m py_compile uc-0c/app.py
          python -m py_compile uc-x/app.py
